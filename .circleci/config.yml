version: 2.1

orbs:
  aws-cli: circleci/aws-cli@5.4.1

environment:
  CI: true

jobs:
  scan-audit:
    docker:
      - image: ghcr.io/aquasecurity/trivy:0.69.3
    working_directory: ~/gocusign/
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Install Docker CLI
          command: |
            apk add --no-cache docker-cli
      - run:
          name: Trivy - Filesystem scan
          command: |
            trivy fs --exit-code 1 --severity HIGH,CRITICAL,MEDIUM --scanners vuln,misconfig,secret --format table --ignorefile ./src/.trivyignore ./src
      - run:
          name: Build production image for scan
          command: |
            docker build -t ${CIRCLE_PROJECT_REPONAME}:${CIRCLE_SHA1} ./src
      - run:
          name: Trivy - Image scan
          command: |
            trivy image --exit-code 1 --severity HIGH,CRITICAL,MEDIUM --scanners vuln --format table --ignorefile ./src/.trivyignore ${CIRCLE_PROJECT_REPONAME}:${CIRCLE_SHA1}

  build-and-test:
    docker:
      - image: akaytatsu/cibuilder:latest
    working_directory: ~/gocusign/
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Build and Test
          command: |
            cp -f src/.env.sample src/.env
            docker-compose -f docker-compose.yml -f docker-compose.tests.yml down
            docker-compose -f docker-compose.yml -f docker-compose.tests.yml build
            docker-compose -f docker-compose.yml -f docker-compose.tests.yml up -d --no-build
      - run:
          name: Cleanup Containers
          command: |
            docker-compose -f docker-compose.yml -f docker-compose.tests.yml down
          when: always

  build-deliver:
    docker:
      - image: akaytatsu/cibuilder:latest
    working_directory: ~/gocusign/
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true

      # Assume Role via OIDC
      - aws-cli/setup:
          role_arn: "${AWS_ROLE_ARN}"
          region: "${AWS_REGION}"
          profile_name: oidc

      # Debug
      - run:
          name: Verify AWS identity
          command: |
            echo "Region: $AWS_REGION"
            echo "Role: $AWS_ROLE_ARN"
            aws --profile oidc sts get-caller-identity

      # Login no ECR
      - run:
          name: Login to ECR
          command: |
            DOCKER_REGISTRY=197272534240.dkr.ecr.$AWS_REGION.amazonaws.com

            aws --profile oidc ecr get-login-password --region $AWS_REGION \
              | docker login --username AWS --password-stdin $DOCKER_REGISTRY

      # Build e Push
      - run:
          name: Build Docker Image
          command: |
            DOCKER_REGISTRY=197272534240.dkr.ecr.$AWS_REGION.amazonaws.com
            BUILD_VERSION=$(echo "$CIRCLE_SHA1" | cut -c 1-8)

            docker build -t msgocusign:"$BUILD_VERSION" ./src

      - run:
          name: Deliver to ECR - Homolog (develop)
          command: |
            DOCKER_REGISTRY=197272534240.dkr.ecr.$AWS_REGION.amazonaws.com
            BUILD_VERSION=$(echo "$CIRCLE_SHA1" | cut -c 1-8)

            if [ "$CIRCLE_BRANCH" = "develop" ]; then
              docker tag msgocusign:"$BUILD_VERSION" "$DOCKER_REGISTRY"/msgocusign-hml:"$BUILD_VERSION"
              docker tag msgocusign:"$BUILD_VERSION" "$DOCKER_REGISTRY"/msgocusign-hml:latest
              docker push "$DOCKER_REGISTRY"/msgocusign-hml:"$BUILD_VERSION"
              docker push "$DOCKER_REGISTRY"/msgocusign-hml:latest
              docker rmi "$DOCKER_REGISTRY"/msgocusign-hml:"$BUILD_VERSION" || true
              docker rmi "$DOCKER_REGISTRY"/msgocusign-hml:latest || true
            fi

      - run:
          name: Deliver to ECR - Production (master)
          command: |
            DOCKER_REGISTRY=197272534240.dkr.ecr.$AWS_REGION.amazonaws.com
            BUILD_VERSION=$(echo "$CIRCLE_SHA1" | cut -c 1-8)

            if [ "$CIRCLE_BRANCH" = "master" ]; then
              docker tag msgocusign:"$BUILD_VERSION" "$DOCKER_REGISTRY"/msgocusign-prd:"$BUILD_VERSION"
              docker tag msgocusign:"$BUILD_VERSION" "$DOCKER_REGISTRY"/msgocusign-prd:latest
              docker push "$DOCKER_REGISTRY"/msgocusign-prd:"$BUILD_VERSION"
              docker push "$DOCKER_REGISTRY"/msgocusign-prd:latest
              docker rmi "$DOCKER_REGISTRY"/msgocusign-prd:"$BUILD_VERSION" || true
              docker rmi "$DOCKER_REGISTRY"/msgocusign-prd:latest || true
            fi

  deploy-to-staging:
    docker:
      - image: akaytatsu/cibuilder:latest
    steps:
      - checkout:
          depth: 1
      - run:
          name: Install ArgoCD CLI
          command: |
            curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
            install -m 555 argocd /usr/local/bin/argocd
            rm argocd
      - run:
          name: Deploy to Homolog Environment (develop)
          command: |
            export ARGOCD_SERVER="$ARGOCD_SERVER"
            export ARGOCD_AUTH_TOKEN="$ARGOCD_AUTH_TOKEN"

            if [ "$CIRCLE_BRANCH" = "develop" ]; then
              argocd --grpc-web app actions run ms-gocusign-hml restart --kind Deployment --all
            fi

  deploy-to-production:
    docker:
      - image: akaytatsu/cibuilder:latest
    steps:
      - checkout:
          depth: 1
      - run:
          name: Install ArgoCD CLI
          command: |
            curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
            install -m 555 argocd /usr/local/bin/argocd
            rm argocd
      - run:
          name: Deploy to Production Environment (master)
          command: |
            export ARGOCD_SERVER="$ARGOCD_SERVER"
            export ARGOCD_AUTH_TOKEN="$ARGOCD_AUTH_TOKEN"

            if [ "$CIRCLE_BRANCH" = "master" ]; then
              argocd --grpc-web app actions run ms-gocusign-prd restart --kind Deployment --all
            fi

workflows:
  version: 2.1
  integration:
    jobs:
      - scan-audit:
          context: environment

      - build-and-test:
          context: environment

      - build-deliver:
          context: environment
          requires:
            - scan-audit
            - build-and-test
          filters:
            branches:
              only:
                - develop
                - master

      - deploy-to-staging:
          context: environment
          requires:
            - build-deliver
          filters:
            branches:
              only:
                - develop

      - deploy-to-production-approval:
          type: approval
          filters:
            branches:
              only:
                - master
          requires:
            - build-deliver

      - deploy-to-production:
          context: environment
          requires:
            - deploy-to-production-approval
          filters:
            branches:
              only:
                - master
