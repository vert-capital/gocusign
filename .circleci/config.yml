version: 2.1

environment:
  CI: true

jobs:
  build-and-test:
    docker:
      - image: 197272534240.dkr.ecr.us-east-1.amazonaws.com/docker-vert:18.06.3-ce-git
        environment:
          DOCKER_REGISTRY: 197272534240.dkr.ecr.us-east-1.amazonaws.com
    working_directory: ~/gocusign/
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Login to AWS ECR
          command: |
            login="$(aws ecr get-login --no-include-email)"
            ${login}
      - run:
          name: Build Docker Images
          command: |
            cp -f src/.env.sample src/.env
            docker-compose -f docker-compose.yml -f docker-compose.tests.yml down
            docker-compose -f docker-compose.yml -f docker-compose.tests.yml build
            docker-compose -f docker-compose.yml -f docker-compose.tests.yml up -d --no-build
      - run:
          name: Stop Containers
          command: |
            docker-compose -f docker-compose.yml -f docker-compose.tests.yml down
          when: always

  build-deliver:
    docker:
      - image: 197272534240.dkr.ecr.us-east-1.amazonaws.com/docker-vert:18.06.3-ce-git
        environment:
          DOCKER_REGISTRY: 197272534240.dkr.ecr.us-east-1.amazonaws.com
    working_directory: ~/gocusign/
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Login to AWS ECR
          command: |
            login="$(aws ecr get-login --no-include-email)"
            ${login}
      - run:
          name: Build Docker Image
          command: |
            cp -f src/.env.sample src/.env
            docker build -t msgocusign ./src
      - run:
          name: Push to ECR - Homolog (develop)
          command: |
            if [ "$CIRCLE_BRANCH" = "develop" ]
            then
                docker tag msgocusign "$DOCKER_REGISTRY"/msgocusign-hml:"$CIRCLE_BUILD_NUM"
                docker tag msgocusign "$DOCKER_REGISTRY"/msgocusign-hml:latest
                docker push "$DOCKER_REGISTRY"/msgocusign-hml:"$CIRCLE_BUILD_NUM"
                docker push "$DOCKER_REGISTRY"/msgocusign-hml:latest
                docker rmi "$DOCKER_REGISTRY"/msgocusign-hml:"$CIRCLE_BUILD_NUM"
                docker rmi "$DOCKER_REGISTRY"/msgocusign-hml:latest
            fi
      - run:
          name: Push to ECR - Production (master)
          command: |
            if [ "$CIRCLE_BRANCH" = "master" ]
            then
                docker tag msgocusign "$DOCKER_REGISTRY"/msgocusign-prd:"$CIRCLE_BUILD_NUM"
                docker tag msgocusign "$DOCKER_REGISTRY"/msgocusign-prd:latest
                docker push "$DOCKER_REGISTRY"/msgocusign-prd:"$CIRCLE_BUILD_NUM"
                docker push "$DOCKER_REGISTRY"/msgocusign-prd:latest
                docker rmi "$DOCKER_REGISTRY"/msgocusign-prd:"$CIRCLE_BUILD_NUM"
                docker rmi "$DOCKER_REGISTRY"/msgocusign-prd:latest
            fi

  deploy-to-staging:
    docker:
      - image: 197272534240.dkr.ecr.us-east-1.amazonaws.com/docker-vert:18.06.3-ce-git
        environment:
          DOCKER_REGISTRY: 197272534240.dkr.ecr.us-east-1.amazonaws.com
    working_directory: ~/gocusign/
    steps:
      - checkout:
          depth: 1
      - run:
          name: Install ArgoCD CLI
          command: |
            curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
            install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
            rm argocd-linux-amd64
      - run:
          name: Deploy to Homolog Environment (develop)
          command: |
            export ARGOCD_SERVER="$ARGOCD_SERVER"
            export ARGOCD_AUTH_TOKEN="$ARGOCD_AUTH_TOKEN_HOMOLOG"

            if [ "$CIRCLE_BRANCH" = "develop" ]
            then
                argocd --grpc-web app actions run ms-gocusign-hml restart --kind Deployment --all
            fi

  deploy-to-production:
    docker:
      - image: 197272534240.dkr.ecr.us-east-1.amazonaws.com/docker-vert:18.06.3-ce-git
        environment:
          DOCKER_REGISTRY: 197272534240.dkr.ecr.us-east-1.amazonaws.com
    working_directory: ~/gocusign/
    steps:
      - checkout:
          depth: 1
      - run:
          name: Install ArgoCD CLI
          command: |
            curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
            install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
            rm argocd-linux-amd64
      - run:
          name: Deploy to Production Environment (master)
          command: |
            export ARGOCD_SERVER="$ARGOCD_SERVER"
            export ARGOCD_AUTH_TOKEN="$ARGOCD_AUTH_TOKEN_PRODUCTION"

            if [ "$CIRCLE_BRANCH" = "master" ]
            then
                argocd --grpc-web app actions run ms-gocusign-prd restart --kind Deployment --all
            fi

workflows:
  version: 2.1
  integration:
    jobs:
      - build-and-test:
          context: environment

      - build-deliver:
          context: environment
          requires:
            - build-and-test
          filters:
            branches:
              only:
                - develop
                - master

      - deploy-to-staging:
          context: environment
          requires:
            - build-deliver
          filters:
            branches:
              only:
                - develop

      - deploy-to-production-approval:
          type: approval
          filters:
            branches:
              only:
                - master
          requires:
            - build-deliver

      - deploy-to-production:
          context: environment
          requires:
            - deploy-to-production-approval
          filters:
            branches:
              only:
                - master
